# Render Blueprint — deploys the whole stack from this repo.
# Postgres + FastAPI API + Next.js web, all on Render's free tier.
# Docs: https://render.com/docs/blueprint-spec
#
# After the first deploy, confirm the two public URLs Render assigned and, if they
# differ from the defaults below, update CORS_ORIGINS (api) and NEXT_PUBLIC_API_URL
# (web) in the dashboard, then redeploy.

databases:
  - name: cpf-db
    plan: free
    databaseName: cpf
    user: cpf

services:
  # ---- FastAPI API -------------------------------------------------------
  - type: web
    name: cpf-wealth-api
    runtime: python
    plan: free
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: cpf-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://cpf-wealth-web.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false   # optional — paste a key to enable AI policy-PDF ingestion

  # ---- Next.js web -------------------------------------------------------
  - type: web
    name: cpf-wealth-web
    runtime: node
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: npm run start -- --port $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://cpf-wealth-api.onrender.com
