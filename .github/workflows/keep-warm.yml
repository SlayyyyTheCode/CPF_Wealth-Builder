name: keep-api-warm

# Pings the API's /health every ~10 minutes so a free-tier backend never goes
# cold (Render free sleeps after 15 min idle; this keeps it awake and warms
# Vercel serverless too). Override the target by setting a repository variable
# API_HEALTH_URL (Settings -> Secrets and variables -> Actions -> Variables).

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC); GitHub may delay under load
  workflow_dispatch: {}       # allow manual runs

# Don't pile up overlapping pings if a run is slow.
concurrency:
  group: keep-api-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health
        run: |
          URL="${{ vars.API_HEALTH_URL }}"
          URL="${URL:-https://api-six-zeta-35.vercel.app/health}"
          echo "Pinging $URL"
          # Retry a few times: the very first hit may pay the cold-start cost.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 40 "$URL"; then
              echo " — warm (attempt $i)"
              exit 0
            fi
            echo "attempt $i failed; waiting 15s…"
            sleep 15
          done
          echo "API did not respond after retries"
          exit 1
